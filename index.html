<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HIT Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    html {
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.18), transparent 32rem),
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.10), transparent 28rem),
        #020617;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body class="font-sans text-slate-100 antialiased">
  <main class="mx-auto flex min-h-screen w-full max-w-7xl flex-col px-4 pb-8 pt-5 sm:px-6 lg:px-8 lg:pt-8">
    <header class="mb-5 overflow-hidden rounded-[2rem] border border-slate-800 bg-slate-950/70 p-5 shadow-2xl shadow-black/30 backdrop-blur lg:p-8">
      <div class="flex flex-col gap-5 lg:flex-row lg:items-end lg:justify-between">
        <div class="max-w-3xl">
          <p class="text-xs font-semibold uppercase tracking-[0.32em] text-blue-300">Low Volume / HIT</p>
          <h1 class="mt-2 text-3xl font-black tracking-tight text-white sm:text-4xl lg:text-5xl">HIT Tracker</h1>
          <p class="mt-2 text-sm leading-6 text-slate-400 sm:text-base">Registre carga e repetições. Use o último treino como alvo de progressão.</p>
        </div>

        <div class="grid grid-cols-2 gap-3 sm:flex sm:items-center">
          <div class="rounded-2xl border border-blue-400/20 bg-blue-400/10 px-4 py-3 text-center">
            <p class="text-[10px] uppercase tracking-widest text-blue-200">Dia</p>
            <p id="currentDayBadge" class="text-sm font-bold text-blue-100 sm:text-base">Domingo</p>
          </div>
          <div class="rounded-2xl border border-emerald-400/20 bg-emerald-400/10 px-4 py-3 text-center">
            <p class="text-[10px] uppercase tracking-widest text-emerald-200">Histórico</p>
            <p id="historyCountBadge" class="text-sm font-bold text-emerald-100 sm:text-base">0 salvo(s)</p>
          </div>
        </div>
      </div>
    </header>

    <nav aria-label="Selecionar dia do treino" class="sticky top-0 z-10 -mx-4 mb-5 border-y border-slate-800/80 bg-slate-950/95 px-4 py-3 backdrop-blur sm:-mx-6 sm:px-6 lg:static lg:mx-0 lg:rounded-3xl lg:border lg:px-4">
      <div id="dayTabs" class="flex gap-2 overflow-x-auto pb-1 lg:grid lg:grid-cols-7 lg:overflow-visible lg:pb-0"></div>
    </nav>

    <section id="dayOverview" class="mb-5 rounded-[1.75rem] border border-slate-800 bg-slate-900/75 p-5 shadow-xl shadow-black/20 lg:p-6">
      <div class="flex flex-col gap-3 lg:flex-row lg:items-start lg:justify-between">
        <div>
          <p id="dayTypeLabel" class="text-xs font-black uppercase tracking-[0.24em] text-blue-300">Treino do dia</p>
          <h2 id="dayTitle" class="mt-1 text-2xl font-black tracking-tight text-white lg:text-3xl"></h2>
          <p id="dayDescription" class="mt-2 max-w-4xl text-sm leading-6 text-slate-400 sm:text-base"></p>
        </div>
        <div id="dayStats" class="grid grid-cols-2 gap-2 sm:flex lg:shrink-0"></div>
      </div>
    </section>

    <section id="restState" class="hidden rounded-[2rem] border border-dashed border-slate-700 bg-slate-900/70 p-6 text-center shadow-xl shadow-black/20 lg:p-10">
      <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-3xl bg-slate-800 text-3xl">💤</div>
      <h2 class="text-2xl font-black text-white">Dia de descanso</h2>
      <p id="restText" class="mx-auto mt-2 max-w-2xl text-sm leading-6 text-slate-400 sm:text-base"></p>
    </section>

    <form id="workoutForm" class="grid grid-cols-1 gap-4 lg:grid-cols-2 2xl:grid-cols-3" autocomplete="off"></form>

    <section id="saveSection" class="mt-5 lg:mx-auto lg:w-full lg:max-w-xl">
      <button
        id="saveWorkoutButton"
        type="button"
        class="w-full rounded-2xl bg-blue-500 px-5 py-4 text-base font-black uppercase tracking-wide text-white shadow-lg shadow-blue-500/25 transition active:scale-[0.98] active:bg-blue-600 disabled:cursor-not-allowed disabled:bg-slate-700 disabled:text-slate-400 disabled:shadow-none sm:text-lg"
      >
        Salvar Treino
      </button>
      <p id="saveFeedback" class="mt-3 min-h-5 text-center text-sm font-medium text-emerald-300" aria-live="polite"></p>
    </section>

    <footer class="mt-auto pt-8 text-center">
      <button
        id="exportHistoryButton"
        type="button"
        class="rounded-xl border border-slate-700 px-4 py-3 text-sm font-semibold text-slate-300 transition active:scale-[0.98] active:border-blue-400 active:text-blue-200"
      >
        Exportar Histórico
      </button>
      <p class="mt-3 text-xs text-slate-500">Dados salvos apenas neste navegador via localStorage.</p>
    </footer>
  </main>

  <script>
    const STORAGE_KEY = 'hitWorkoutHistory';

    const days = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];

    const workoutPlan = {
      Domingo: {
        type: 'workout',
        title: 'Push (Foco Peito Medial, Ombro e Tríceps 1)',
        description: 'Foco no peitoral, ombros e tríceps com prioridade em estímulos de qualidade.',
        exercises: [
          {
            name: 'Pec Deck (Voador) ou Crossover Polia Média',
            note: 'Apertando 2 segundos no pico de contração para o miolo do peito.',
            sets: [
              { name: 'Working Set 1', target: '10-15 rep.' },
              { name: 'Working Set 2', target: '10-15 rep.' },
            ],
          },
          {
            name: 'Supino Reto (Máquina Articulada ou Halteres)',
            sets: [
              { name: 'Top Set', target: '6-8 rep.' },
              { name: 'Back-off Set', target: '10-12 rep.' },
            ],
          },
          {
            name: 'Supino Inclinado com Halteres',
            sets: [
              { name: 'Top Set', target: '6-8 rep.' },
            ],
          },
          {
            name: 'Desenvolvimento Máquina',
            sets: [
              { name: 'Top Set', target: '6-9 rep.' },
              { name: 'Back-off Set', target: '10-12 rep.' },
            ],
          },
          {
            name: 'Elevação Lateral no Cabo',
            note: 'Falha total.',
            sets: [
              { name: 'Working Set 1', target: '10-15 rep.' },
              { name: 'Working Set 2', target: '10-15 rep.' },
            ],
          },
          {
            name: 'Tríceps Pulley (Corda ou Barra V)',
            note: 'Séries pesadas até a falha.',
            sets: [
              { name: 'Working Set 1', target: '10-12 rep.' },
              { name: 'Working Set 2', target: '10-12 rep.' },
            ],
          },
        ],
      },
      Segunda: {
        type: 'workout',
        title: 'Pull (Foco Dorsal, Posterior e Bíceps 1)',
        description: 'Treino de puxar focando em dorsais, deltoide posterior e bíceps.',
        exercises: [
          {
            name: 'Puxada Alta (Pegada Pronada Aberta)',
            sets: [
              { name: 'Top Set', target: '6-8 rep.' },
              { name: 'Back-off Set', target: '10-12 rep.' },
            ],
          },
          {
            name: 'Remada Curvada ou Máquina (Pegada Neutra ou Supinada)',
            sets: [
              { name: 'Top Set', target: '6-8 rep.' },
              { name: 'Back-off Set', target: '10-12 rep.' },
            ],
          },
          {
            name: 'Pulldown com Corda',
            note: 'Esprema a contração no final de cada repetição.',
            sets: [
              { name: 'Working Set 1', target: '10-15 rep.' },
              { name: 'Working Set 2', target: '10-15 rep.' },
            ],
          },
          {
            name: 'Crucifixo Invertido (Máquina ou Cabo)',
            sets: [
              { name: 'Working Set 1', target: '12-15 rep.' },
              { name: 'Working Set 2', target: '12-15 rep.' },
            ],
          },
          {
            name: 'Rosca Direta (Barra W ou Reta)',
            sets: [
              { name: 'Top Set', target: '6-8 rep.' },
              { name: 'Back-off Set', target: '10-12 rep.' },
            ],
          },
        ],
      },
      Terça: {
        type: 'workout',
        title: 'Pernas (Foco Quadríceps) e Panturrilha',
        description: 'Foco na porção anterior das pernas e panturrilhas com alta intensidade.',
        exercises: [
          {
            name: 'Panturrilha em Pé (Máquina ou Smith)',
            note: 'Segure 2 segundos no alongamento máximo.',
            sets: [
              { name: 'Working Set 1', target: '10-15 rep.' },
              { name: 'Working Set 2', target: '10-15 rep.' },
            ],
          },
          {
            name: 'Cadeira Extensora',
            note: 'Use técnica de intensidade na última série.',
            sets: [
              { name: 'Working Set 1', target: '10-15 rep.' },
              { name: 'Working Set 2', target: '10-15 rep.' },
            ],
          },
          {
            name: 'Leg Press 45º ou Agachamento Hack',
            note: 'Top set pesadíssima.',
            sets: [
              { name: 'Top Set', target: '6-10 rep.' },
              { name: 'Back-off Set', target: '12-15 rep.' },
            ],
          },
          {
            name: 'Agachamento Búlgaro (com Halteres)',
            note: 'Levada à falha por perna.',
            sets: [
              { name: 'Top Set', target: '8-12 rep. por perna' },
            ],
          },
        ],
      },
      Quarta: {
        type: 'rest',
        title: 'Descanso Total',
        description: 'Pausa no meio da semana para comer, descansar as articulações e recuperar o sistema nervoso.',
        exercises: [],
      },
      Quinta: {
        type: 'workout',
        title: 'Upper Touch-up, Ombro e Braços',
        description: 'Sessão com volume um pouco mais alto, mas focada em isoladores e bombear sangue para os pontos fracos.',
        exercises: [
          {
            name: 'Crossover Polia Alta (puxando para baixo)',
            note: 'Falha com parciais. (Touch-up Peito)',
            sets: [
              { name: 'Working Set 1', target: '10-15 rep.' },
              { name: 'Working Set 2', target: '10-15 rep.' },
            ],
          },
          {
            name: 'Puxada Alta (Pegada Triângulo/Neutra)',
            note: '(Touch-up Dorsal)',
            sets: [
              { name: 'Working Set 1', target: '8-12 rep.' },
              { name: 'Working Set 2', target: '8-12 rep.' },
            ],
          },
          {
            name: 'Desenvolvimento com Halteres',
            note: 'Série pesada até a falha.',
            sets: [
              { name: 'Working Set', target: '8-10 rep.' },
            ],
          },
          {
            name: 'Elevação Lateral com Halteres',
            sets: [
              { name: 'Top Set', target: '8-12 rep.' },
              { name: 'Back-off Set', target: '12-15 rep.' },
            ],
          },
          {
            name: 'Elevação Frontal no Cabo (Corda)',
            sets: [
              { name: 'Working Set', target: '10-12 rep.' },
            ],
          },
          {
            name: 'Tríceps Testa (Barra W ou Halteres)',
            sets: [
              { name: 'Top Set', target: '6-8 rep.' },
              { name: 'Back-off Set', target: '10-12 rep.' },
            ],
          },
          {
            name: 'Tríceps Francês (Cabo ou Halter)',
            note: 'Falha no alongamento.',
            sets: [
              { name: 'Working Set 1', target: '10-12 rep.' },
              { name: 'Working Set 2', target: '10-12 rep.' },
            ],
          },
          {
            name: 'Rosca Inclinada com Halteres (banco 45º)',
            sets: [
              { name: 'Top Set', target: '8-10 rep.' },
              { name: 'Back-off Set', target: '10-12 rep.' },
            ],
          },
          {
            name: 'Rosca Martelo (Halteres ou Corda)',
            note: 'Foco em construir o braquial.',
            sets: [
              { name: 'Working Set 1', target: '10-12 rep.' },
              { name: 'Working Set 2', target: '10-12 rep.' },
            ],
          },
        ],
      },
      Sexta: {
        type: 'workout',
        title: 'Pernas (Foco Posterior) e Panturrilha',
        description: 'Foco na cadeia posterior das pernas para equilibrar a musculatura e prevenir lesões.',
        exercises: [
          {
            name: 'Mesa Flexora',
            sets: [
              { name: 'Top Set', target: '6-8 rep.' },
              { name: 'Back-off Set', target: '10-12 rep.' },
            ],
          },
          {
            name: 'Cadeira Flexora',
            sets: [
              { name: 'Working Set 1', target: '10-15 rep.' },
              { name: 'Working Set 2', target: '10-15 rep.' },
            ],
          },
          {
            name: 'Stiff ou RDL (Romano)',
            sets: [
              { name: 'Top Set', target: '6-8 rep.' },
              { name: 'Back-off Set', target: '10-12 rep.' },
            ],
          },
          {
            name: 'Panturrilha Sentado (Gêmeos)',
            note: 'Séries pesadas.',
            sets: [
              { name: 'Working Set 1', target: '10-15 rep.' },
              { name: 'Working Set 2', target: '10-15 rep.' },
            ],
          },
        ],
      },
      Sábado: {
        type: 'rest',
        title: 'Descanso Total',
        description: 'Aproveite para focar na dieta e desligar totalmente do ferro.',
        exercises: [],
      },
    };

    let selectedDay = days[0];

    const dayTabs = document.getElementById('dayTabs');
    const currentDayBadge = document.getElementById('currentDayBadge');
    const historyCountBadge = document.getElementById('historyCountBadge');
    const dayOverview = document.getElementById('dayOverview');
    const dayTypeLabel = document.getElementById('dayTypeLabel');
    const dayTitle = document.getElementById('dayTitle');
    const dayDescription = document.getElementById('dayDescription');
    const dayStats = document.getElementById('dayStats');
    const workoutForm = document.getElementById('workoutForm');
    const restState = document.getElementById('restState');
    const restText = document.getElementById('restText');
    const saveSection = document.getElementById('saveSection');
    const saveWorkoutButton = document.getElementById('saveWorkoutButton');
    const saveFeedback = document.getElementById('saveFeedback');
    const exportHistoryButton = document.getElementById('exportHistoryButton');

    function slugify(value) {
      return value
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_+|_+$/g, '');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getEntryKey(exerciseName, setName) {
      return `${slugify(exerciseName)}__${slugify(setName)}`;
    }

    function readHistory() {
      try {
        const rawHistory = localStorage.getItem(STORAGE_KEY);
        return rawHistory ? JSON.parse(rawHistory) : {};
      } catch (error) {
        console.error('Erro ao ler histórico:', error);
        return {};
      }
    }

    function writeHistory(history) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function getDayHistory(day) {
      const history = readHistory();
      return Array.isArray(history[day]) ? history[day] : [];
    }

    function getLastWorkoutForDay(day) {
      const dayHistory = getDayHistory(day);
      return dayHistory.length > 0 ? dayHistory[dayHistory.length - 1] : null;
    }

    function formatLastEntry(entry) {
      if (!entry || (entry.weight === '' && entry.reps === '')) {
        return 'Último: sem registro';
      }

      const weight = entry.weight !== '' && entry.weight !== undefined ? `${entry.weight}kg` : '—kg';
      const reps = entry.reps !== '' && entry.reps !== undefined ? entry.reps : '—';
      return `Último: ${weight} x ${reps}`;
    }

    function countSets(exercises) {
      return exercises.reduce((total, exercise) => total + exercise.sets.length, 0);
    }

    function renderDayTabs() {
      dayTabs.innerHTML = days
        .map((day) => {
          const plan = workoutPlan[day];
          const isActive = day === selectedDay;
          const isRestDay = plan.type === 'rest';
          const label = isRestDay ? `${day} · OFF` : day;

          return `
            <button
              type="button"
              data-day="${escapeHtml(day)}"
              class="day-tab min-w-fit rounded-xl px-4 py-3 text-sm font-bold transition active:scale-95 lg:min-w-0 ${
                isActive
                  ? 'bg-blue-500 text-white shadow-lg shadow-blue-500/20'
                  : isRestDay
                    ? 'bg-slate-900 text-slate-400 ring-1 ring-slate-800'
                    : 'bg-slate-900 text-slate-200 ring-1 ring-slate-800'
              }"
              aria-pressed="${isActive}"
            >
              ${escapeHtml(label)}
            </button>
          `;
        })
        .join('');

      document.querySelectorAll('.day-tab').forEach((button) => {
        button.addEventListener('click', () => {
          selectedDay = button.dataset.day;
          saveFeedback.textContent = '';
          renderApp();
        });
      });
    }

    function renderDayOverview() {
      const plan = workoutPlan[selectedDay];
      const exercises = plan.exercises || [];
      const savedCount = getDayHistory(selectedDay).length;

      currentDayBadge.textContent = selectedDay;
      historyCountBadge.textContent = `${savedCount} salvo(s)`;
      dayTypeLabel.textContent = plan.type === 'rest' ? 'Recuperação' : 'Treino do dia';
      dayTypeLabel.className = `text-xs font-black uppercase tracking-[0.24em] ${plan.type === 'rest' ? 'text-emerald-300' : 'text-blue-300'}`;
      dayTitle.textContent = plan.title;
      dayDescription.textContent = plan.description;

      dayStats.innerHTML = plan.type === 'rest'
        ? `
          <div class="rounded-2xl bg-slate-950/80 px-4 py-3 text-center ring-1 ring-slate-800">
            <p class="text-2xl font-black text-emerald-300">OFF</p>
            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Status</p>
          </div>
        `
        : `
          <div class="rounded-2xl bg-slate-950/80 px-4 py-3 text-center ring-1 ring-slate-800">
            <p class="text-2xl font-black text-white">${exercises.length}</p>
            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Exercícios</p>
          </div>
          <div class="rounded-2xl bg-slate-950/80 px-4 py-3 text-center ring-1 ring-slate-800">
            <p class="text-2xl font-black text-white">${countSets(exercises)}</p>
            <p class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Séries</p>
          </div>
        `;
    }

    function createSetCard(exercise, setInfo, lastWorkout) {
      const entryKey = getEntryKey(exercise.name, setInfo.name);
      const lastEntry = lastWorkout?.entries?.[entryKey];
      const lastText = formatLastEntry(lastEntry);

      return `
        <div class="rounded-2xl border border-slate-800 bg-slate-950/80 p-4">
          <div class="mb-3 flex items-start justify-between gap-3">
            <div>
              <h3 class="text-base font-extrabold text-white">${escapeHtml(setInfo.name)}</h3>
              <p class="mt-0.5 text-sm font-semibold text-blue-300">${escapeHtml(setInfo.target)}</p>
            </div>
            <span class="rounded-full bg-slate-800 px-3 py-1 text-xs font-bold uppercase tracking-wide text-slate-300">Set</span>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <label class="block">
              <span class="text-xs font-bold uppercase tracking-wide text-slate-400">Carga (kg)</span>
              <input
                type="number"
                inputmode="decimal"
                min="0"
                step="0.5"
                placeholder="0"
                data-entry-key="${entryKey}"
                data-exercise="${escapeHtml(exercise.name)}"
                data-set="${escapeHtml(setInfo.name)}"
                data-target="${escapeHtml(setInfo.target)}"
                data-field="weight"
                class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-900 px-3 py-4 text-lg font-black text-white outline-none transition placeholder:text-slate-600 focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20"
              />
              <span class="mt-1 block text-xs text-slate-400">${escapeHtml(lastText)}</span>
            </label>

            <label class="block">
              <span class="text-xs font-bold uppercase tracking-wide text-slate-400">Repetições</span>
              <input
                type="number"
                inputmode="numeric"
                min="0"
                step="1"
                placeholder="0"
                data-entry-key="${entryKey}"
                data-exercise="${escapeHtml(exercise.name)}"
                data-set="${escapeHtml(setInfo.name)}"
                data-target="${escapeHtml(setInfo.target)}"
                data-field="reps"
                class="mt-1 w-full rounded-xl border border-slate-700 bg-slate-900 px-3 py-4 text-lg font-black text-white outline-none transition placeholder:text-slate-600 focus:border-blue-400 focus:ring-2 focus:ring-blue-400/20"
              />
              <span class="mt-1 block text-xs text-slate-400">${escapeHtml(lastText)}</span>
            </label>
          </div>
        </div>
      `;
    }

    function createExerciseCard(exercise, lastWorkout) {
      return `
        <article class="flex h-full flex-col rounded-[1.75rem] border border-slate-800 bg-slate-900/75 p-4 shadow-xl shadow-black/20">
          <div class="mb-4">
            <p class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">Exercício</p>
            <h2 class="mt-1 text-xl font-black text-white">${escapeHtml(exercise.name)}</h2>
            ${exercise.note ? `<p class="mt-2 rounded-2xl bg-blue-500/10 px-3 py-2 text-xs font-medium leading-5 text-blue-100 ring-1 ring-blue-400/10">${escapeHtml(exercise.note)}</p>` : ''}
          </div>
          <div class="mt-auto space-y-3">
            ${exercise.sets.map((setInfo) => createSetCard(exercise, setInfo, lastWorkout)).join('')}
          </div>
        </article>
      `;
    }

    function renderWorkout() {
      const plan = workoutPlan[selectedDay];
      const exercises = plan.exercises || [];
      const lastWorkout = getLastWorkoutForDay(selectedDay);
      const isRestDay = plan.type === 'rest';

      restState.classList.toggle('hidden', !isRestDay);
      workoutForm.classList.toggle('hidden', isRestDay);
      saveSection.classList.toggle('hidden', isRestDay);
      saveWorkoutButton.disabled = isRestDay;

      if (isRestDay) {
        workoutForm.innerHTML = '';
        restText.textContent = plan.description;
        return;
      }

      workoutForm.innerHTML = exercises
        .map((exercise) => createExerciseCard(exercise, lastWorkout))
        .join('');
    }

    function renderApp() {
      renderDayTabs();
      renderDayOverview();
      renderWorkout();
    }

    function collectCurrentWorkoutEntries() {
      const entries = {};
      const inputs = workoutForm.querySelectorAll('input[data-entry-key][data-field]');

      inputs.forEach((input) => {
        const entryKey = input.dataset.entryKey;
        const field = input.dataset.field;

        if (!entries[entryKey]) {
          entries[entryKey] = {
            exercise: input.dataset.exercise,
            set: input.dataset.set,
            target: input.dataset.target,
            weight: '',
            reps: '',
          };
        }

        entries[entryKey][field] = input.value;
      });

      return entries;
    }

    function hasAnyFilledValue(entries) {
      return Object.values(entries).some((entry) => entry.weight !== '' || entry.reps !== '');
    }

    function saveWorkout() {
      const plan = workoutPlan[selectedDay];

      if (plan.type === 'rest') {
        return;
      }

      const entries = collectCurrentWorkoutEntries();

      if (!hasAnyFilledValue(entries)) {
        saveFeedback.textContent = 'Preencha pelo menos uma carga ou repetição.';
        saveFeedback.className = 'mt-3 min-h-5 text-center text-sm font-medium text-amber-300';
        return;
      }

      const history = readHistory();

      if (!Array.isArray(history[selectedDay])) {
        history[selectedDay] = [];
      }

      history[selectedDay].push({
        date: new Date().toISOString(),
        day: selectedDay,
        title: plan.title,
        entries,
      });

      writeHistory(history);

      saveFeedback.textContent = 'Treino salvo. Últimos valores atualizados!';
      saveFeedback.className = 'mt-3 min-h-5 text-center text-sm font-medium text-emerald-300';

      renderDayOverview();
      renderWorkout();
    }

    function exportHistory() {
      const history = readHistory();
      const payload = {
        app: 'HIT Tracker',
        storageKey: STORAGE_KEY,
        exportedAt: new Date().toISOString(),
        history,
      };

      const json = JSON.stringify(payload, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const fileDate = new Date().toISOString().slice(0, 10);

      const link = document.createElement('a');
      link.href = url;
      link.download = `hit-workout-history-${fileDate}.json`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    saveWorkoutButton.addEventListener('click', saveWorkout);
    exportHistoryButton.addEventListener('click', exportHistory);

    renderApp();
  </script>
</body>
</html>
